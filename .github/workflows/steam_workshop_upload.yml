name: Upload to Steam Workshop

# Allow the action to push changes back to main
permissions:
  contents: write

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  upload_workshop:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'dev'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check if TLD_Nynorsk folder changed
        id: changes
        run: |
          CHANGED_FILES=$(git diff --name-only \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }})
      
          echo "Changed files:"
          echo "$CHANGED_FILES"
      
          if echo "$CHANGED_FILES" | grep -q '^TLD_Nynorsk/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in TLD_Nynorsk — skipping all downstream steps"
          fi



      - name: Extract changenote from pull request summary
        id: changenote
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -e
          BODY="${{ github.event.pull_request.body }}"
          echo "changenote=$(jq -Rn --arg str "$BODY" '$str')" >> $GITHUB_OUTPUT
          echo "Changenote:"
          echo "$BODY"



      - name: Update changenote in Workshop_TLD_Nynorsk.vdf
        id: update_changenote
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VDF="Workshop_TLD_Nynorsk.vdf"
          NOTE="${{ steps.changenote.outputs.changenote }}"
          
          # Make release tag, date today + increment version number
          DATE=$(date +'%d.%m.%y')
          LAST_TAG=$(gh release list --limit 1000 --json tagName,isLatest --jq '.[] | select(.isLatest) | .tagName // "none"')
          if [ -z "$LAST_TAG" ]; then
            NEXT_V=1
          else
            # Plukk ut v-nummer fra tag, f.eks "02.02.26.v42" -> 42
            LAST_V=$(echo "$LAST_TAG" | grep -oE '\.v[0-9]+$' | tr -d '.v')
            NEXT_V=$((LAST_V + 1))
          fi
          TAG="$DATE.v$NEXT_V"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          echo "DATE: $DATE"
          echo "LAST_TAG from gh release list: '$LAST_TAG'"
          echo "Extracted LAST_V: '$LAST_V'"
          echo "NEXT_V: $NEXT_V"
          echo "Generated TAG: $TAG"

      
          LINK="[url=https://github.com/${{ github.repository }}/releases/tag/$TAG]Sjå oppdateringa $TAG på GitHub![/url]"
      
          export NOTE
          export LINK
          export VDF
      
          python3 << 'EOF'
          import os
          import re
          
          vdf_path = os.environ["VDF"]
          note = os.environ["NOTE"]
          link = os.environ["LINK"]
          
          # Build final note safely
          final_note = f"{note}\n\n{link}"
          
          # Escape only what VDF requires
          final_note = final_note.replace("\\", "\\\\")
          final_note = final_note.replace('"', '\\"')
          final_note = final_note.replace("\r\n", "\n").replace("\r", "\n")
          final_note = final_note.replace("\n", "\\n")
          
          with open(vdf_path, "r", encoding="utf-8") as f:
              content = f.read()
          
          # Replace existing changenote field (robust regex, multiline safe)
          if re.search(r'"changenote"\s+"[^"]*"', content, flags=re.S):
              content = re.sub(
                  r'"changenote"\s+"[^"]*"',
                  f'"changenote"  "{final_note}"',
                  content,
                  flags=re.S
              )
          else:
              # If missing, insert before final closing brace
              content = content.rstrip()[:-1] + f'\n  "changenote"  "{final_note}"\n}}\n'
          
          with open(vdf_path, "w", encoding="utf-8") as f:
              f.write(content)
          
          print("Changenote updated safely.")
          EOF


      - name: Commit & push updated VDF back to main
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Sync with remote
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git rebase origin/main

          echo "Committing updated changenote (if changed)..."
          git add Workshop_TLD_Nynorsk.vdf
          git commit -m "ci: update changenote [skip ci]" || echo "No changes to commit"
          git push origin main

          

      - name: Install SteamCMD
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -e
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y lib32gcc-s1 lib32stdc++6 wget unzip
          wget https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
          mkdir -p ~/steamcmd
          tar -xvzf steamcmd_linux.tar.gz -C ~/steamcmd
          echo "$HOME/steamcmd" >> $GITHUB_PATH

      - name: Upload to Steam Workshop
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -e
          steamcmd.sh +login ${{ secrets.STEAM_USERNAME }} ${{ secrets.STEAM_PASSWORD }} \
                      +workshop_build_item "$(pwd)/Workshop_TLD_Nynorsk.vdf" +quit

      - name: Create GitHub Release
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.update_changenote.outputs.tag }}" \
            TLD_Nynorsk/TLD_Nynorsk.csv \
            TLD_Nynorsk_Bilete.png \
            Workshop_TLD_Nynorsk.vdf \
            --title "${{ steps.update_changenote.outputs.tag }}" \
            --notes "${{ steps.changenote.outputs.changenote }}"
